# Template secrets for dashboard-front
#
# Local:
#   mkdir -p dashboard-front/.streamlit
#   cp dashboard-front/.streamlit.example/secrets.toml dashboard-front/.streamlit/secrets.toml
#   streamlit run dashboard-front/app/main.py
#
# Streamlit Community Cloud:
#   Paste this TOML into the app's Secrets UI.

[auth]
cookie_name = "household"
cookie_key = "CHANGE_ME_TO_A_LONG_RANDOM_SECRET"
cookie_expiry_days = 30

# Optional: restrict access
# allowed_usernames = ["user1", "partner"]

[auth.usernames.user1]
name = "user1"
email = "user1@example.com"
plain_password = "CHANGE_ME"

[auth.usernames.partner]
name = "Partner"
email = "partner@example.com"
plain_password = "CHANGE_ME_TOO"
